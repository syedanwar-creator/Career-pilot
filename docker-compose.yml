services:
  postgres:
    image: postgres:16-alpine
    container_name: career-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: career_pilot
      POSTGRES_USER: career_pilot
      POSTGRES_PASSWORD: career_pilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: career-pilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
